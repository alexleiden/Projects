<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сучасна лабораторна</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
        color: white;
      }

      .container {
        max-width: 1100px;
        margin: auto;
        padding: 30px;
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 20px;
        backdrop-filter: blur(10px);
        transition: 0.4s;
        position: relative;
        overflow: hidden;
      }

      .card:hover {
        transform: translateY(-10px) scale(1.02);
      }

      .card::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        transform: rotate(45deg);
        top: -50%;
        left: -50%;
        animation: shine 5s infinite;
      }

      @keyframes shine {
        0% {
          transform: translateX(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(100%) rotate(45deg);
        }
      }

      .image-box {
        height: 250px;
        overflow: hidden;
        border-radius: 15px;
        margin-bottom: 15px;
        position: relative;
        cursor: crosshair;
      }

      /* Лупа */
      .image-box::after {
        content: "";
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.6);
        background-repeat: no-repeat;
        background-size: 200%;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%);
      }

      .image-box:hover::after {
        opacity: 1;
      }

      .image-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.5s;
      }

      .image-box:hover img {
        transform: scale(1.15);
      }

      button {
        background: linear-gradient(45deg, #22c55e, #06b6d4);
        border: none;
        padding: 15px 25px;
        border-radius: 12px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.1);
      }

      .result {
        margin-top: 30px;
        opacity: 0;
        transform: translateY(20px);
        transition: 0.6s;
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 15px;
      }

      .result.show {
        opacity: 1;
        transform: translateY(0);
      }

      .progress {
        height: 8px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        margin-bottom: 25px;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #22c55e, #06b6d4);
        border-radius: 10px;
        transition: 0.5s;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

    </div>
